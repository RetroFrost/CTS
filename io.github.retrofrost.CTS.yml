app-id: io.github.retrofrost.CTS
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.10'
command: comparison-timeline-studio

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '24.08'
    add-ld-path: .
    no-autodownload: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --env=PATH=/app/lib/ffmpeg:/app/bin:/usr/bin

cleanup-commands:
  - /app/cleanup-BaseApp.sh

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/pkgconfig
  - '*.a'
  - '*.la'

modules:
  - name: python3-pybind11
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation pybind11==3.0.4
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b3/06/c3a23c9a0263b136c519f033a58d4641e73065fefc7754e9667ec206d992/pybind11-3.0.4-py3-none-any.whl
        sha256: 961720ee652da51d531b7b2451a6bd2bc042b0106e6d9baa48ecb7d58034ce63

  - name: python3-Pillow
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation Pillow==12.3.0
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/1c/3d/bb7fca845737cf9d7dbde16ed1843984665ff2e0a518f5db43e77ec540b9/pillow-12.3.0.tar.gz
        sha256: 3b8182a766685eaa002637e28b4ec8d6b18819a0c71f579bf0dbaa5830297cce

  - name: python3-et-xmlfile
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation et-xmlfile==2.0.0
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d3/38/af70d7ab1ae9d4da450eeec1fa3918940a5fafb9055e934af8d6eb0c2313/et_xmlfile-2.0.0.tar.gz
        sha256: dab3f4764309081ce75662649be815c4c9081e88f0837825f90fd28317d4da54

  - name: python3-openpyxl
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation openpyxl==3.1.5
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/3d/f9/88d94a75de065ea32619465d2f77b29a0469500e99012523b91cc4141cd1/openpyxl-3.1.5.tar.gz
        sha256: cf0e3cf56142039133628b5acffe8ef0c12bc902d2aadd3e0fe5878dc08d1050

  - name: cts
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
      - install -d ${FLATPAK_DEST}/lib/ffmpeg
      - install -Dm644 io.github.retrofrost.CTS.desktop ${FLATPAK_DEST}/share/applications/io.github.retrofrost.CTS.desktop
      - install -Dm644 io.github.retrofrost.CTS.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.retrofrost.CTS.metainfo.xml
      - install -Dm644 io.github.retrofrost.CTS.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.retrofrost.CTS.svg
      - install -Dm644 LICENSE ${FLATPAK_DEST}/share/licenses/io.github.retrofrost.CTS/LICENSE
    sources:
      - type: git
        url: https://github.com/RetroFrost/CTS.git
        commit: 30aaecad146e62b69a9930f3df5bdf6163533ebe
      - type: file
        path: packaging/flatpak/io.github.retrofrost.CTS.desktop
      - type: file
        path: packaging/flatpak/io.github.retrofrost.CTS.metainfo.xml
      - type: file
        path: packaging/flatpak/io.github.retrofrost.CTS.svg
