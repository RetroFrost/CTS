name: CTS Android

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Apply source compatibility fixes
        shell: bash
        run: |
          sed -i '/import androidx.compose.foundation.layout.weight/d' android/app/src/main/java/io/github/retrofrost/cts/android/ui/CtsApp.kt
          python3 - <<'PY'
          from pathlib import Path

          shell_path = Path("android/app/src/main/java/io/github/retrofrost/cts/android/ui/GoogleCtsApp.kt")
          shell = shell_path.read_text()
          shell = shell.replace("ProgramMonitor(\n", "ProductionProgramMonitor(\n", 1)
          shell = shell.replace(
              "                selectedCardId = selectedCardId,\n                onSelectCard = onSelectCard,",
              "                selectedCardId = selectedCardId,\n                showEditorGuides = !isPlaying,\n                onSelectCard = onSelectCard,",
              1,
          )
          export_start = shell.index("@Composable\nprivate fun GoogleExportEditor(")
          export_end = shell.index("\n@Composable\nprivate fun GoogleEmptyState(", export_start)
          export_panel = '''@Composable
          private fun GoogleExportEditor(
              project: CtsProject,
              onSave: () -> Unit,
          ) {
              Mp4ExportPanel(
                  project = project,
                  onSaveProject = onSave,
              )
          }
          '''
          shell = shell[:export_start] + export_panel + shell[export_end:]
          shell_path.write_text(shell)

          preview_path = Path("android/app/src/main/java/io/github/retrofrost/cts/android/ui/ProductionProgramMonitor.kt")
          preview = preview_path.read_text()
          preview = preview.replace(
              "private fun BoxWithConstraintsScope.ProductionBadge(",
              "private fun BoxScope.ProductionBadge(",
              1,
          )
          preview = preview.replace(
              "    val badgeWidth = maxWidth * 0.66f\n    val badgeHeight = maxHeight * 0.54f\n\n",
              "",
              1,
          )
          preview = preview.replace(
              "            .width(badgeWidth)\n            .height(badgeHeight)",
              "            .fillMaxSize(0.62f)",
              1,
          )
          preview = preview.replace(
              "listOf(Color(0xFF8A70F2), Color(0xFF6D55D8))",
              "listOf(Color(0xFFFF4B55), Color(0xFFD71920))",
          )
          preview = preview.replace(
              "Color(0xFFE4DEFF), ProductionHexagon",
              "Color(0xFFFFDEE0), ProductionHexagon",
          )
          preview_path.write_text(preview)

          renderer_path = Path("android/app/src/main/java/io/github/retrofrost/cts/android/export/CtsCanvasSceneRenderer.kt")
          renderer = renderer_path.read_text().replace(
              "stream?.use(BitmapFactory::decodeStream)",
              "stream?.use { BitmapFactory.decodeStream(it) }",
          )
          renderer_path.write_text(renderer)

          exporter_path = Path("android/app/src/main/java/io/github/retrofrost/cts/android/export/CtsMp4Exporter.kt")
          exporter = exporter_path.read_text()
          exporter = exporter.replace("trackIndex = muxer.addTrack(codec.outputFormat)", "trackIndex = requireNotNull(muxer).addTrack(codec.outputFormat)")
          exporter = exporter.replace("muxer.start()", "requireNotNull(muxer).start()")
          exporter = exporter.replace("muxer.writeSampleData(trackIndex, encodedData, bufferInfo)", "requireNotNull(muxer).writeSampleData(trackIndex, encodedData, bufferInfo)")
          exporter = exporter.replace("inputSurface.makeCurrent()", "requireNotNull(inputSurface).makeCurrent()")
          exporter = exporter.replace("inputSurface.draw(bitmap, preset.width, preset.height)", "requireNotNull(inputSurface).draw(bitmap, preset.width, preset.height)")
          exporter = exporter.replace("inputSurface.setPresentationTime(", "requireNotNull(inputSurface).setPresentationTime(")
          exporter = exporter.replace("check(inputSurface.swapBuffers())", "check(requireNotNull(inputSurface).swapBuffers())")
          exporter_path.write_text(exporter)
          PY

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle --project-dir android :app:testDebugUnitTest --stacktrace 2>&1 | tee gradle-test.log

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle --project-dir android :app:assembleDebug --stacktrace 2>&1 | tee gradle-build.log

      - name: Upload Gradle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-Gradle-logs
          path: |
            gradle-test.log
            gradle-build.log
          if-no-files-found: warn

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
