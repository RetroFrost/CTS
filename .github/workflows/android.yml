name: CTS Android

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Apply source compatibility fixes
        shell: bash
        run: |
          sed -i '/import androidx.compose.foundation.layout.weight/d' android/app/src/main/java/io/github/retrofrost/cts/android/ui/CtsApp.kt
          python3 - <<'PY'
          from pathlib import Path
          path = Path("android/app/src/main/java/io/github/retrofrost/cts/android/ui/GoogleCtsApp.kt")
          text = path.read_text()
          text = text.replace("ProgramMonitor(\n", "ProductionProgramMonitor(\n", 1)
          text = text.replace(
              "                selectedCardId = selectedCardId,\n                onSelectCard = onSelectCard,",
              "                selectedCardId = selectedCardId,\n                showEditorGuides = !isPlaying,\n                onSelectCard = onSelectCard,",
              1,
          )
          path.write_text(text)
          PY

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle --project-dir android :app:testDebugUnitTest --stacktrace 2>&1 | tee gradle-test.log

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle --project-dir android :app:assembleDebug --stacktrace 2>&1 | tee gradle-build.log

      - name: Upload Gradle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-Gradle-logs
          path: |
            gradle-test.log
            gradle-build.log
          if-no-files-found: warn

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
