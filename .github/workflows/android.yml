name: CTS Cross-platform

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "comparison_studio/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "comparison_studio/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android and test shared renderer
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate desktop badge renderer
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check Pillow
          python -m compileall -q comparison_studio
          python - <<'PY'
          from comparison_studio.exact_badge import render_reference_badge_layer

          phases = (0.01, 0.30, 0.58, 0.76, 0.90, 1.00)
          bounds = []
          for phase in phases:
              frame = render_reference_badge_layer(
                  480,
                  1080,
                  "10",
                  "SECONDS OLD",
                  phase,
              )
              assert frame.size == (480, 1080)
              bbox = frame.getchannel("A").getbbox()
              assert bbox is not None, phase
              bounds.append(bbox)

          # It starts as the source's tiny upper-left sliver and ends at the measured badge.
          assert bounds[0][2] - bounds[0][0] < 80, bounds[0]
          assert bounds[-1][2] - bounds[-1][0] > 300, bounds[-1]
          assert bounds[-1][1] <= 20, bounds[-1]
          print("desktop badge smoke frames:", bounds)
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle --project-dir android :app:assembleDebug --stacktrace --console=plain 2>&1 | tee android/gradle-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-build-log
          path: android/gradle-build.log
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle --project-dir android :app:testDebugUnitTest --stacktrace --console=plain 2>&1 | tee android/gradle-test.log

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Android-test-log
          path: android/gradle-test.log
          if-no-files-found: error
