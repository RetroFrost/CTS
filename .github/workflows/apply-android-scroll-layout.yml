name: Apply Android scroll timing and adaptive layout

on:
  push:
    branches:
      - agent/android-background-export
    paths:
      - tools/apply_android_scroll_and_adaptive_layout.py
      - .github/workflows/apply-android-scroll-layout.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-background-export
          fetch-depth: 0

      - name: Apply migration
        run: python tools/apply_android_scroll_and_adaptive_layout.py

      - name: Validate patch
        run: git diff --check

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android
          git commit -m "Restore CTS scroll timing and adaptive card fields"
          git push origin HEAD:agent/android-background-export
