name: CTS Easy check

on:
  pull_request:
    paths:
      - "comparison_studio/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/cts-easy-check.yml"
  push:
    branches:
      - feature/cts-easy

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile Python sources
        run: python -m compileall -q comparison_studio run.py

      - name: Run CTS Easy timing tests
        id: easy-tests
        env:
          QT_QPA_PLATFORM: offscreen
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_easy_timing.py" -v > cts-easy-test.log 2>&1
          status=$?
          cat cts-easy-test.log
          exit "$status"

      - name: Upload CTS Easy test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cts-easy-test-log
          path: cts-easy-test.log
          if-no-files-found: error

      - name: Run complete unit suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v
