name: CTS Easy check

on:
  pull_request:
    paths:
      - "comparison_studio/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/cts-easy-check.yml"
  push:
    branches:
      - feature/cts-easy

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update --quiet
          sudo apt-get install --yes --quiet libegl1 libgl1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile Python sources
        run: python -m compileall -q comparison_studio run.py

      - name: Run unit and offscreen UI tests
        env:
          QT_QPA_PLATFORM: offscreen
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee desktop-test.log

      - name: Upload desktop test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: CTS-desktop-test-log
          path: desktop-test.log
          if-no-files-found: error
