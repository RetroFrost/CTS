name: CTS Desktop

on:
  push:
    branches: [main]
    paths:
      - "comparison_studio/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "comparison_studio/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test desktop renderer
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q comparison_studio tests

      - name: Run desktop tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee desktop-tests.log

      - name: Upload desktop test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CTS-Desktop-test-log
          path: desktop-tests.log
          if-no-files-found: warn
