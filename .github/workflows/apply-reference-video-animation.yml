name: Apply reference video animation

on:
  push:
    branches:
      - agent/android-background-export
    paths:
      - tools/apply_reference_video_animation.py
      - .github/workflows/apply-reference-video-animation.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-background-export

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply full-video behavior
        run: python tools/apply_reference_video_animation.py

      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "CTS Animation Bot"
          git config user.email "actions@users.noreply.github.com"
          git add shared comparison_studio android tests tools/sync_shared_contract.py
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Match the full reference video animation"
          git push origin HEAD:agent/android-background-export
